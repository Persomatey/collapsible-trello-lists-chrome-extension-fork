name: Auto Patch Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      zip_name:
        description: "Name of the ZIP file (without .zip extension)"
        required: false
        default: "CollapsibleTrelloLists"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get highest semver tag
        id: get_tag
        run: |
          all_tags=$(git tag -l "v*")
          if [ -z "$all_tags" ]; then
            last_tag="v0.0.0"
          else
            last_tag=$(printf "%s\n" $all_tags | sort -t. -k1,1V -k2,2V -k3,3V | tail -n 1)
          fi
          echo "last_tag=$last_tag" >> $GITHUB_OUTPUT

      - name: Calculate next PATCH version
        id: bump
        run: |
          last="${{ steps.get_tag.outputs.last_tag }}"
          version=${last#v}
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          new_tag="v$major.$minor.$patch"
          new_version="$major.$minor.$patch"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Update version in manifest.json
        run: |
          new_version="${{ steps.bump.outputs.new_version }}"
          jq --arg v "$new_version" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Commit updated manifest.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD

      - name: Create new tag and push it
        run: |
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: Build release notes
        id: release_notes
        run: |
          # For a push event, github.event.before is the SHA before the push.
          # For workflow_dispatch, fall back to the previous tag as the base.
          if [ "${{ github.event_name }}" = "push" ]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha="${{ steps.get_tag.outputs.last_tag }}"
          fi

          notes=""
          # Iterate over each commit SHA in the range (oldest to newest)
          while IFS= read -r sha; do
            subject=$(git log -1 --format="%s" "$sha")
            body=$(git log -1 --format="%b" "$sha")
            short=$(git rev-parse --short "$sha")

            notes="${notes}### \`${short}\` ${subject}"$'\n'
            if [ -n "$body" ]; then
              notes="${notes}${body}"$'\n'
            fi
            notes="${notes}"$'\n'
          done < <(git log --reverse --format="%H" "${base_sha}..HEAD")

          if [ -z "$notes" ]; then
            notes="No commit information available."
          fi

          # Write to a file to safely pass multiline content
          echo "$notes" > release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Build ZIP name
        id: zipname
        run: |
          base="${{ github.event.inputs.zip_name }}"
          tag="${{ steps.bump.outputs.new_tag }}"
          if [ -z "$base" ]; then
            base="CollapsibleTrelloLists"
          fi
          zipname="${base}.zip"
          echo "zipname=$zipname" >> $GITHUB_OUTPUT

      - name: Create ZIP excluding .github
        run: |
          zip -r "${{ steps.zipname.outputs.zipname }}" . -x ".github/*" ".git/*"

      - name: Create Release and upload asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump.outputs.new_tag }}
          name: Release ${{ steps.bump.outputs.new_tag }}
          bodyFile: ${{ steps.release_notes.outputs.notes_file }}
          artifacts: ${{ steps.zipname.outputs.zipname }}
          allowUpdates: true
          draft: false
          prerelease: false
